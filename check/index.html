<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>Cesium 3D Tiles Viewer</title>
  <link href="Cesium/Widgets/widgets.css" rel="stylesheet" />
  <script src="Cesium/Cesium.js"></script>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    #cesiumContainer {
      width: 100%;
      height: 100%;
    }
    .loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.7);
      color: white;
      padding: 20px 30px;
      border-radius: 10px;
      font-size: 16px;
      z-index: 1000;
      text-align: center;
    }
    .loading.error {
      background: rgba(255, 0, 0, 0.7);
    }
  </style>
</head>
<body>
  <div id="cesiumContainer"></div>
  <div id="loading" class="loading">正在加载 3D 模型...</div>

  <script>
    const tileMatrixSetID = "EPSG:3857_map_3857";
    const tileMatrixLabels = [];
    for (let i = 0; i <= 21; i++) {
      tileMatrixLabels.push(tileMatrixSetID + ":" + i);
    }

    const wmtsProvider = new Cesium.WebMapTileServiceImageryProvider({
      url: "https://whdz.whkc.com.cn:9009/geoserver/gwc/service/wmts",
      layer: "map_3857",
      style: "",
      format: "image/png",
      tileMatrixSetID: tileMatrixSetID,
      tileMatrixLabels: tileMatrixLabels,
      tilingScheme: new Cesium.WebMercatorTilingScheme(),
      tileWidth: 256,
      tileHeight: 256,
      minimumLevel: 0,
      maximumLevel: 21
    });

    var viewer = new Cesium.Viewer("cesiumContainer", {
      terrainProvider: new Cesium.EllipsoidTerrainProvider(),
      baseLayer: new Cesium.ImageryLayer(wmtsProvider),
      baseLayerPicker: false,
      geocoder: false,
      timeline: false,
      animation: false,
      homeButton: false,
      sceneModePicker: false,
      navigationHelpButton: false,
      fullscreenButton: false
    });


    // 告诉 Cesium，去 /data_tiles/ 虚拟通道下找你的 json 索引文件
    Cesium.Cesium3DTileset.fromUrl("/data_tiles/tileset.json")
      .then(function(tileset) {
        viewer.scene.primitives.add(tileset);
        viewer.zoomTo(tileset);
        document.getElementById("loading").style.display = "none";
      })
      .catch(function(error) {
        console.error("3D Tiles load failed:", error);
        var loadingEl = document.getElementById("loading");
        loadingEl.className = "loading error";
        loadingEl.innerHTML = "加载失败<br>请检查数据目录是否正确";
      });
  </script>
</body>
</html>
